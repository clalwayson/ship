<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加微信</title>
  <meta name="description" content="添加微信好友。扫描二维码或搜索微信号即可添加。">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Theme Toggle Button -->
  <button class="theme-toggle" id="themeToggleBtn" aria-label="切换深色模式">
    <!-- Sun Icon (visible in dark mode) -->
    <svg id="sunIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path
        d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z" />
    </svg>
    <!-- Moon Icon (visible in light mode) -->
    <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path
        d="M9.37 5.51c-.18.64-.27 1.31-.27 1.99 0 4.08 3.32 7.4 7.4 7.4.68 0 1.35-.09 1.99-.27C17.58 17.67 14.99 20 12 20c-4.41 0-8-3.59-8-8 0-2.99 2.33-5.58 5.37-6.49zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10c0-.18-.01-.35-.02-.53-.1.08-.2.15-.3.23-1.07.82-2.4 1.3-3.82 1.3-3.59 0-6.5-2.91-6.5-6.5 0-1.42.49-2.75 1.31-3.82.08-.1.15-.2.23-.3-.18-.01-.35-.02-.53-.02z" />
    </svg>
  </button>

  <!-- Redirect Main Card -->
  <main class="redirect-card" id="redirectCard">

    <!-- Brand Header -->
    <div class="brand-header">
      <div class="logo-wrapper">
        <!-- WeChat Brand Logo SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M8.384 10.668c-.46 0-.834-.343-.834-.766s.374-.766.834-.766.834.343.834.766-.374.766-.834.766zm4.84 0c-.46 0-.835-.343-.835-.766s.374-.766.835-.766.834.343.834.766-.373.766-.834.766zm6.398-3.79c0-3.326-3.418-6.02-7.636-6.02C7.77 1 4.35 3.694 4.35 7.02c0 1.875 1.08 3.553 2.76 4.707-.156.49-.618 1.95-.618 1.95s1.583-.87 2.502-1.347c.594.137 1.218.212 1.865.212.188 0 .373-.008.56-.02-.323-.624-.508-1.332-.508-2.086 0-3.13 2.977-5.67 6.643-5.67.65 0 1.272.08 1.862.228-.015-.06-.03-.12-.03-.182zm-2.07 9.4c0-2.613-2.663-4.733-5.952-4.733s-5.95 2.12-5.95 4.734c0 2.616 2.66 4.734 5.95 4.734.505 0 .993-.05 1.458-.152.716.483 1.95 1.223 1.95 1.223s-.478-1.398-.602-1.782c1.312-.907 2.194-2.226 2.194-3.757zm-6.843-.728c-.363 0-.656-.27-.656-.603s.293-.604.656-.604c.362 0 .656.27.656.604s-.294.603-.656.603zm3.792 0c-.362 0-.656-.27-.656-.603s.294-.604.656-.604c.363 0 .656.27.656.604s-.293.603-.656.603z" />
        </svg>
      </div>
      <h1>微信联系</h1>
    </div>

    <!-- QR Code Scanning Area -->
    <div class="qr-container">
      <div class="scan-corner top-left"></div>
      <div class="scan-corner top-right"></div>
      <div class="scan-corner bottom-left"></div>
      <div class="scan-corner bottom-right"></div>
      <div class="scan-laser"></div>
      <img src="wechat-qr.png" alt="微信号 w284366479 微信二维码" class="qr-image" id="qrImage">
    </div>

    <!-- Invitation & Text Description -->
    <p class="description-text">
      扫描上方二维码，或复制下方微信号，即可添加我为微信好友。
    </p>

    <!-- Copy WeChat ID Widget -->
    <div class="copy-box">
      <span class="wechat-id-label" id="wechatId">w284366479</span>
      <button class="copy-btn" id="copyBtn" aria-label="复制微信号">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
        </svg>
        <span>复制微信号</span>
      </button>
    </div>

    <!-- Detailed Setup / Scan Guides -->
    <div class="instructions-list">
      <div class="instruction-item">
        <span class="instruction-step">1</span>
        <span class="instruction-text">在手机上打开微信。</span>
      </div>
      <div class="instruction-item">
        <span class="instruction-step">2</span>
        <span class="instruction-text">点击右上角的 <strong>"+"</strong> 号选择 <strong>"扫一扫"</strong> 扫描二维码，或在搜索栏中粘贴复制的微信号。</span>
      </div>
      <div class="instruction-item">
        <span class="instruction-step">3</span>
        <span class="instruction-text">发送好友申请，即可开始聊天交流！</span>
      </div>
    </div>

  </main>

  <!-- Copy Success Toast Alert -->
  <div class="toast" id="copyToast" role="alert" aria-live="polite">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
    </svg>
    <span>微信号已成功复制到剪贴板！</span>
  </div>

  <script src="app.js"></script>
</body>

</html>
